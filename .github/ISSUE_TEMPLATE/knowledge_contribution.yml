name: Knowledge Base / SOP Katkısı
description: Bilgi tabanına yeni kural, pattern veya SOP revizyonu önerin
labels: ["knowledge"]
body:
  - type: markdown
    attributes:
      value: |
        Bu template, `.claude/knowledge-base.md` veya sistem prosedürlerine (SOP) katkı için kullanılır.

  - type: dropdown
    id: type
    attributes:
      label: Katkı Türü
      options:
        - Yeni Kural / Öğrenme
        - SOP Revizyonu
        - Pattern Tespiti
        - Bilinen Hata / Çözüm
    validations:
      required: true

  - type: textarea
    id: rule
    attributes:
      label: Kural veya Öneri
      description: Ne öğrenildi ya da ne değişmeli?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Neden?
      description: Motivasyon — bir olay, tekrarlayan sorun veya gözlem
    validations:
      required: true

  - type: textarea
    id: apply
    attributes:
      label: Nasıl Uygulanmalı?
      description: Bu kural hangi durumlarda devreye girmeli?
    validations:
      required: true

  - type: input
    id: source
    attributes:
      label: Kaynak
      description: Hangi proje, oturum veya deneyimden geliyor?
      placeholder: "örn: kiliczsh/kalfa, oturum 2026-03-21"
    validations:
      required: false
